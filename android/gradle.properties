org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true

# If you want Gradle to use a specific JDK (recommended for reproducible builds),
# set the absolute path to your JDK 21 installation below. Example on Windows:
# org.gradle.java.home=C:\Program Files\Eclipse Adoptium\jdk-21.0.35-hotspot
# Uncomment and edit the line above after installing JDK 21 on your machine.
org.gradle.java.installations.auto-download=true
